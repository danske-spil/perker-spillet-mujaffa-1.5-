<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Perkerspillet</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: black;
            height: 100%;
            overflow: hidden;
        }

        #game {
            width: 800px;
            height: 600px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="game"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("game").appendChild(player);

        player.load("perkerspillet.swf");
    </script>
</body>
</html>
